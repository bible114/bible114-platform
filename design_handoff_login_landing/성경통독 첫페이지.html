<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>성경통독 114</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet" />
  <style>
    html, body { margin: 0; padding: 0; background: #f0eee9; font-family: "Pretendard", system-ui, sans-serif; }
    * { box-sizing: border-box; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="hero-shared.jsx"></script>
  <script type="text/babel" src="hero-a.jsx"></script>

  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "headline": "혼자가 아니라,\n같이 펼칩니다.",
      "accent": "#b8702a",
      "bg": "#f5efe4"
    }/*EDITMODE-END*/;

    function App() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

      return (
        <>
          <DesignCanvas>
            <DCSection
              id="login"
              title="성경통독 114 — 첫 페이지 (로그인/랜딩)"
              subtitle="전국 교회와 성도가 함께 펼치는 통독. 우상단 토글로 ‘성도 / 교회 관리자’ 로그인을 전환할 수 있어요."
            >
              <DCArtboard id="login-warm" label="로그인 · 따뜻한 서재" width={1440} height={900}>
                <HeroA tweaks={t} />
              </DCArtboard>
            </DCSection>
          </DesignCanvas>

          <TweaksPanel title="Tweaks">
            <TweakSection label="브랜드" />
            <TweakColor label="배경"     value={t.bg}     onChange={(v) => setTweak('bg', v)} />
            <TweakColor label="액센트"   value={t.accent} onChange={(v) => setTweak('accent', v)} />
            <TweakSection label="카피" />
            <TweakText  label="헤드라인" value={t.headline} onChange={(v) => setTweak('headline', v)} />
          </TweaksPanel>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
